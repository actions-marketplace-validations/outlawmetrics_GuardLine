rules:
  - id: "CFG-001"
    name: "Docker image using latest tag"
    file_pattern: "Dockerfile"
    type: "pattern"
    pattern: "FROM.*:latest"
    severity: "warning"
    description: "Using the latest tag means your build is not reproducible and could pull a broken or vulnerable image without warning"
    remediation: "Pin to a specific version like python:3.13 instead of python:latest"

  - id: "CFG-002"
    name: "Docker container running as root"
    file_pattern: "Dockerfile"
    type: "required"
    required: "USER"
    severity: "warning"
    description: "No USER instruction found which means the container runs as root giving an attacker full privileges if compromised"
    remediation: "Add a non-root user with RUN useradd -m appuser and switch to it with USER appuser"

  - id: "CFG-003"
    name: "Docker container copying all files"
    file_pattern: "Dockerfile"
    type: "pattern"
    pattern: "COPY \\."
    severity: "warning"
    description: "COPY with a dot source copies everything including potentially sensitive files like .env, .git, and node_modules into the container"
    remediation: "Add a .dockerignore file or copy only specific files and directories needed for the application"