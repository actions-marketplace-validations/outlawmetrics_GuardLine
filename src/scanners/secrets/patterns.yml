patterns:
  - id: "SEC-001"
    name: "AWS Access Key ID"
    pattern: "AKIA[0-9A-Z]{16}"
    severity: "critical"
    confidence: "high"
    description: "AWS Access Key IDs start with AKIA followed by 16 alphanumeric characters"
    remediation: "Move to environment variable AWS_ACCESS_KEY_ID and add to .gitignore"

  - id: "SEC-002"
    name: "JSON Web Token"
    pattern: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}"
    severity: "warning"
    confidence: "high"
    description: "JWT tokens start with eyJ (base64 encoded JSON header) followed by a dot-separated payload"
    remediation: "Move token to environment variable and never commit to source control"

  - id: "SEC-003"
    name: "Database Connection String with Password"
    pattern: "(postgres|mysql|mongodb|redis)://[^:]+:[^@]+@"
    severity: "critical"
    confidence: "high"
    description: "Database connection URI containing embedded credentials in the format protocol://user:password@host"
    remediation: "Store connection string in environment variable and reference via os.getenv()"

  - id: "SEC-004"
    name: "Hardcoded Secret Assignment"
    pattern: "(password|secret|api_key|api_secret|token)\\s*=\\s*['\"][^'\"]{8,}['\"]"
    severity: "warning"
    confidence: "medium"
    description: "A variable with a sensitive name is assigned a hardcoded string value instead of referencing an environment variable"
    remediation: "Replace hardcoded value with os.getenv() in Python or process.env in JavaScript and store the value in a .env file"